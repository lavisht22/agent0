name: Publish image

# Releases are cut by pushing a SemVer tag:
#   git tag v2.1.0 && git push origin v2.1.0
# The tag is the single source of truth — it names the image AND is baked in as
# APP_VERSION, so the two can never drift. Nothing publishes on ordinary merges.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No QEMU: the build stage is pinned to $BUILDPLATFORM (runs natively) and
      # the per-arch runner stage only COPYs files + sets metadata — it never
      # executes target-arch binaries, so nothing needs emulation.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent0
          # From tag v2.1.0 → :2.1.0, :2.1, :2, and :latest (latest=auto, skipped
          # for pre-releases). steps.meta.outputs.version is the v-stripped value.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Same value that names the image, so GET /api/v1/version matches the tag.
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
